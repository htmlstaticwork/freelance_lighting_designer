<!doctype html>
<html lang="en" dir="ltr" data-theme="dark" data-accent="gold">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — LuxFrame</title>
    <meta name="description" content="Access your LuxFrame account." />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/dark-mode.css" />
    <link rel="stylesheet" href="assets/css/rtl.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .auth-card {
        width: 100%;
        max-width: 480px;
        position: relative;
        z-index: 2;
      }
      .auth-logo {
        display: block;
        margin: 0 auto 32px;
        width: fit-content;
        background: var(--white);
        padding: 6px 12px;
        border-radius: 8px;
      }
      .auth-logo img {
        height: 40px;
        width: auto;
      }
    </style>
  </head>
  <body>
    <div class="position-fixed top-0 end-0 p-3 z-3 d-flex gap-2">
      <button class="icon-btn" type="button" data-action="toggle-combined" aria-label="Toggle Theme and Accent">
        <i class="bi bi-moon-stars fs-5" aria-hidden="true"></i>
      </button>
      <button class="chip-btn" type="button" data-action="toggle-dir">
        RTL
      </button>
    </div>
    <main id="main">
      <section class="blackout-stage is-revealed" aria-label="Login">
        <div class="spotlight" aria-hidden="true"></div>
        
        <div class="auth-container">
          <div class="auth-card">
            
            <div class="surface p-4 p-md-5">
              <a href="index.html" class="auth-logo mb-4" aria-label="LuxFrame Home">
                <img src="assets/images/luxframe-logo.svg" alt="LuxFrame" />
              </a>

              <form class="needs-validation" novalidate>
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email Address</label>
                  <input type="email" class="form-control" id="loginEmail" required placeholder="name@example.com">
                  <div class="invalid-feedback">Please provide a valid email.</div>
                </div>
                
                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••">
                    <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePassword" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px; border-color: color-mix(in srgb, var(--fg) 16%, transparent); background: var(--bg); color: var(--fg);">
                      <i class="bi bi-eye"></i>
                    </button>
                    <div class="invalid-feedback">Please enter your password.</div>
                  </div>
                </div>

                <div class="mb-4 d-flex justify-content-between align-items-center">
                  <div class="form-check mb-0">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">Remember me</label>
                  </div>
                  <a href="#" class="small text-accent">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-solid w-100 mb-4">Sign In</button>
                
                <div class="text-center mb-4">
                  <div class="d-flex align-items-center mb-3">
                    <hr class="flex-grow-1 my-0 opacity-25">
                    <span class="mx-3 small text-muted">Or continue with</span>
                    <hr class="flex-grow-1 my-0 opacity-25">
                  </div>
                  <div class="social-row justify-content-center mt-0 pt-1">
                    <a href="#" aria-label="Sign in with Google">
                      <i class="bi bi-google"></i>
                    </a>
                    <a href="#" aria-label="Sign in with Facebook">
                      <i class="bi bi-facebook"></i>
                    </a>
                    <a href="#" aria-label="Sign in with Apple">
                      <i class="bi bi-apple"></i>
                    </a>
                  </div>
                </div>

                <div class="text-center mt-2">
                  <p class="small mb-0">Don't have an account? <a href="register.html" class="text-accent">Register here</a></p>
                </div>
              </form>
            </div>
            
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/main.js"></script>
    <script>
      (() => {
        'use strict'
        
        // Password visibility toggle
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#loginPassword');
        
        if (togglePassword && password) {
          togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.querySelector('i').classList.toggle('bi-eye');
            this.querySelector('i').classList.toggle('bi-eye-slash');
          });
        }

        const forms = document.querySelectorAll('.needs-validation')
        Array.from(forms).forEach(form => {
          form.addEventListener('submit', event => {
            if (!form.checkValidity()) {
              event.preventDefault()
              event.stopPropagation()
            }
            form.classList.add('was-validated')
          }, false)
        })
      })()
    </script>
  </body>
</html>
