<!doctype html>
<html lang="en" dir="ltr" data-theme="dark" data-accent="gold">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — LuxFrame</title>
    <meta name="description" content="Create your LuxFrame account." />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/dark-mode.css" />
    <link rel="stylesheet" href="assets/css/rtl.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .auth-card {
        width: 100%;
        max-width: 480px;
        position: relative;
        z-index: 2;
      }
      .auth-logo {
        display: block;
        margin: 0 auto 32px;
        width: fit-content;
        background: var(--white);
        padding: 8px 16px;
        border-radius: 8px;
      }
      .auth-logo img {
        height: 48px;
        width: auto;
      }
    </style>
  </head>
  <body>
    <div class="position-fixed top-0 end-0 p-3 z-3 d-flex gap-2">
      <button class="icon-btn" type="button" data-action="toggle-combined" aria-label="Toggle Theme and Accent">
        <i class="bi bi-moon-stars fs-5" aria-hidden="true"></i>
      </button>
      <button class="chip-btn" type="button" data-action="toggle-dir">
        RTL
      </button>
    </div>
    <main id="main">
      <section class="blackout-stage is-revealed" aria-label="Register">
        <div class="spotlight" aria-hidden="true"></div>
        
        <div class="auth-container">
          <div class="auth-card">
            <a href="index.html" class="auth-logo" aria-label="LuxFrame Home">
              <img src="assets/images/luxframe-logo.svg" alt="LuxFrame" />
            </a>
            
            <div class="surface p-4 p-md-5">
              <div class="text-center mb-4">
                <div class="kicker mb-2">Join</div>
                <h1 class="h3">Create an Account</h1>
                <p class="small text-muted">Join the production list and manage your lighting cues.</p>
              </div>

              <form class="needs-validation" novalidate>
                <div class="row g-3 mb-3">
                  <div class="col-sm-6">
                    <label for="regFirstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="regFirstName" required placeholder="John">
                    <div class="invalid-feedback">First name is required.</div>
                  </div>
                  <div class="col-sm-6">
                    <label for="regLastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="regLastName" required placeholder="Doe">
                    <div class="invalid-feedback">Last name is required.</div>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="regEmail" class="form-label">Email Address</label>
                  <input type="email" class="form-control" id="regEmail" required placeholder="name@example.com">
                  <div class="invalid-feedback">Please provide a valid email.</div>
                </div>
                
                <div class="mb-3">
                  <label for="regPassword" class="form-label">Password</label>
                  <input type="password" class="form-control" id="regPassword" required placeholder="••••••••" minlength="8">
                  <div class="invalid-feedback">Password must be at least 8 characters.</div>
                </div>

                <div class="mb-4">
                  <label for="regPasswordConfirm" class="form-label">Confirm Password</label>
                  <input type="password" class="form-control" id="regPasswordConfirm" required placeholder="••••••••">
                  <div class="invalid-feedback">Please confirm your password.</div>
                </div>

                <div class="mb-4 form-check">
                  <input type="checkbox" class="form-check-input" id="terms" required>
                  <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-accent">Terms of Service</a> and <a href="#" class="text-accent">Privacy Policy</a></label>
                  <div class="invalid-feedback">You must agree to the terms.</div>
                </div>

                <button type="submit" class="btn btn-solid w-100 mb-3">Create Account</button>
                
                <div class="text-center">
                  <p class="small mb-0">Already have an account? <a href="login.html" class="text-accent">Login here</a></p>
                </div>
              </form>
            </div>
            
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/main.js"></script>
    <script>
      (() => {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')
        Array.from(forms).forEach(form => {
          form.addEventListener('submit', event => {
            const password = form.querySelector('#regPassword');
            const confirm = form.querySelector('#regPasswordConfirm');
            
            if (password && confirm && password.value !== confirm.value) {
              confirm.setCustomValidity('Passwords do not match');
            } else if (confirm) {
              confirm.setCustomValidity('');
            }

            if (!form.checkValidity()) {
              event.preventDefault()
              event.stopPropagation()
            }
            form.classList.add('was-validated')
          }, false)
        })
      })()
    </script>
  </body>
</html>
